<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Babysite - Cadastro</title>
    
    <link rel="icon" href="../../css/logo_do_babysite.ico" type="image/x-icon">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <header class="navbar shadow-sm py-2 px-4 mb-5" style="background-color: #df9100;">
        <div class="container-fluid d-flex align-items-center">
            <a href="/" class="navbar-brand d-flex align-items-center text-decoration-none">
                <img src="../../css/logo_do_babysite.ico" alt="Logo" width="65" height="65" 
                     class="rounded-circle border border-3 shadow" 
                     style="border-color: rgb(119, 0, 255) !important;">
                <h1 class="h4 text-white mb-0 ms-3 fw-bold">Faça seu Cadastro!</h1>
            </a>
        </div>
    </header>

    <main class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-6">
                
                <div class="card border-0 shadow-lg p-4 rounded-4">
                    
                    <div class="text-center mb-4">
                        <h2 class="fw-bold text-dark">Cadastra-se como Responsável</h2>
                    </div>

                    <form id="form-responsavel">
                        
                        <div class="mb-3">
                            <label class="form-label fw-bold">Nome do Responsável:</label>
                            <input type="text" class="form-control form-control-lg border-secondary-subtle shadow-sm rounded-3" id="pais" required>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">CPF:</label>
                                <input type="text" class="form-control form-control-lg border-secondary-subtle shadow-sm rounded-3" id="cpf" required>
                            </div>
                            
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Telefone:</label>
                                <input type="tel" class="form-control form-control-lg border-secondary-subtle shadow-sm rounded-3" id="telefone" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Email Principal:</label>
                            <input type="email" class="form-control form-control-lg border-secondary-subtle shadow-sm rounded-3" id="email1" required>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold">Email Secundário:</label>
                            <input type="email" class="form-control form-control-lg border-secondary-subtle shadow-sm rounded-3" id="email2">
                        </div>

                        <button type="submit" id="confirmar" class="btn btn-lg w-100 fw-bold text-white shadow" 
                                style="background-color: #f79c1b; border-radius: 10px;">
                            CONFIRMAR
                        </button>

                    </form>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../js/inclusao_responsaveis/script_respon.js"></script>

</body>
</html>
