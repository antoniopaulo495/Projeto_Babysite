<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Babysite - Cadastro de Babá</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="icon" href="../../../css/logo_do_babysite.ico" type="image/x-icon">
    
    <link rel="stylesheet" href="../../../css/inclusao_babas/formulario/estilização_formulario_babas.css">
</head>
<body class="bg-light">

    <header class="navbar bg-babysite-laranja p-3 shadow-sm text-white">
        <div class="container-fluid d-flex align-items-center gap-3">
            <img src="../../../css/logo_do_babysite.ico" alt="logo" width="55" height="55" class="rounded-circle border border-2 border-white">
            <h1 class="h3 mb-0 fw-bold italic text-white">Faça seu Cadastro!</h1>
        </div>
    </header>

    <main class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-7 col-lg-6">
                <div class="card card-cadastro border-0 shadow-lg p-5">
                    <form id="meu_formulario">
                        
                        <div class="mb-3">
                            <label for="Nome_baba" class="form-label fw-bold text-dark">Nome Completo:</label>
                            <input type="text" class="form-control form-control-lg" id="Nome_baba" placeholder="Ex: Maria Oliveira" required>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label for="cpf_baba" class="form-label fw-bold text-dark">CPF:</label>
                                <input type="text" class="form-control form-control-lg" id="cpf_baba" placeholder="000.000.000-00" required>
                            </div>
                            <div class="col-md-6">
                                <label for="telefone_baba" class="form-label fw-bold text-dark">Telefone/Zap:</label>
                                <input type="tel" class="form-control form-control-lg" id="telefone_baba" placeholder="(00) 00000-0000" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="email_1" class="form-label fw-bold text-dark">E-mail Principal:</label>
                            <input type="email" class="form-control form-control-lg" id="email_1" placeholder="nome@email.com" required>
                        </div>

                        <div class="mb-4">
                            <label for="email_2" class="form-label fw-bold text-dark">E-mail Reserva (Opcional):</label>
                            <input type="email" class="form-control form-control-lg" id="email_2" placeholder="outro@email.com">
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-babysite-roxo btn-lg fw-bold shadow-sm">
                                CONFIRMAR CADASTRO
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../../js/inclusao_babas/formulario/inclusao_baba.js"></script>
</body>
</html>
