<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Babysite - Foto de Perfil</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="icon" href="../../../css/logo_do_babysite.ico" type="image/x-icon">
    
    <link rel="stylesheet" href="../../../css/inclusao_babas/perfil/estilização_perfil.css">
</head>
<body class="bg-light">

    <header class="superior bg-babysite-laranja p-3 shadow-sm d-flex align-items-center gap-3 text-white">
        <img src="../../../css/logo_do_babysite.ico" alt="logo" width="55" height="55" 
             style="border-radius: 100px; border: 2px solid rgb(119, 0, 255);">
        <h1 class="h3 mb-0 fw-bold italic">Foto de Perfil</h1>
    </header>

    <main class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-5">
                <div class="card card-cadastro border-0 shadow-lg p-5 text-center">
                    <h2 class="h4 fw-bold text-dark mb-4">Escolha sua melhor foto!</h2>
                    
                    <div id="preview_container" class="mb-4 d-flex justify-content-center">
                        <div class="rounded-circle border border-4 shadow-sm" 
                             style="width: 180px; height: 180px; overflow: hidden; border-color: rgb(119, 0, 255) !important;">
                            <img id="foto_preview" src="#" alt="Preview" 
                                 style="width: 100%; height: 100%; object-fit: cover; display: none;">
                            <div id="placeholder_icon" class="d-flex align-items-center justify-content-center h-100 bg-light text-muted">
                                <span style="font-size: 50px;">👤</span>
                            </div>
                        </div>
                    </div>

                    <form id="form_perfil">
                        <div class="mb-4">
                            <label for="foto_perfil" class="btn btn-outline-secondary w-100 fw-bold">
                                Selecionar Imagem
                            </label>
                            <input type="file" id="foto_perfil" accept="image/*" class="d-none" required>
                        </div>

                        <div class="d-grid">
                            <button id="SalvarPerfil" type="submit" class="btn btn-babysite-roxo btn-lg fw-bold shadow-sm">
                                FINALIZAR CADASTRO
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../../js/inclusao_babas/perfil_foto/perfil.js"></script>
</body>
</html>
