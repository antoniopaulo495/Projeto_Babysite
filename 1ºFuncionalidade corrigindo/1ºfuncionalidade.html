<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="imagem/icon" href="logo_do_babysite.ico">                                    
    <title>1ºfuncionalidade</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <header class="superior">
        <img src="logo_do_babysite.ico" alt="logo_do_babysite" style="border-radius: 100px; border: 2px solid rgb(119, 0, 255) ";>
        <h1> Bem vindo ao Babysite!</h1> 
        <input size="batata" type="search">
    </header>

   <div class="wrapper">
    <button id="left" class="arrow-btn" aria-label="Slide anterior">
        <i class="material-icons">chevron_left</i>
    </button>
    
    <section class="carousel" id="carousel-container">
        <article class="card">
            <figure>
                <img src="baba1.jfif" alt="Foto de Ana Julia">
                <figcaption class="card-info">
                    <h3>Ana Julia</h3>
                    <div class="meta-info">
                        <span class="rating">
                            <i class="material-icons star" aria-hidden="true">star</i> 4.9
                        </span>
                        <i class="material-icons dot" aria-hidden="true">fiber_manual_record</i>
                        <span>24 anos • Bilingue</span>
                    </div>
                </figcaption>
            </figure>
        </article>
    </section>

    <button id="right" class="arrow-btn" aria-label="Próximo slide">
        <i class="material-icons">chevron_right</i>
    </button>
</div>
<script>
    // O Javascript é o mesmo, pois a lógica de arrastar não muda com o visual dos cards
   
</script>

</body>
</html>
