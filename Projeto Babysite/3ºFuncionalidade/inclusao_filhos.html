<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>inclusão_de_filhos</title>
    <link rel="icon" href="../2ºFuncionalidade/logo_do_babysite.ico" type="image/x-icon">
    <link rel="stylesheet" href="inclusao_filhos.css">
  
</head>
<body>

    <header class="superior">
        <img src="../2º Funcionalidades/logo_do_babysite.ico" alt="">
        <h1>Inclua seus filhos</h1>
    </header>

    <main class="layout_formulario">
     <div class="card_login">
        <label for="Nome">Nome</label>
       <input type="text" id="Nome" name="Nome">
       <label for="CPF">CPF</label>
       <input id="CPF" name="CPF">
       <label for="Alergias">Alguma Alergia ou deficiência?</label>
       <input type="file" id="Alergias" style="background-color: rgb(223, 145, 0)">
       <button id="cadastra_se">Cadastrar filho</button>
      </div>

     
    </main>

    <script src="script_inclus_filhos.js"></script>
