<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Babysite - Inclua seus filhos</title>
    
    <link rel="icon" href="../../css/logo_do_babysite.ico" type="image/x-icon">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="../../css/inclusao_filhos/estilização_filhos.css">
</head>
<body class="bg-light">

    <header class="superior shadow-sm">
        <img src="../../css/logo_do_babysite.ico" alt="Logo Babysite" width="60" height="60">
        <h1 class="mb-0">Inclua seus filhos</h1>
    </header>

    <main class="container layout_formulario">
    <div class="row justify-content-center w-100">
        <div class="col-12 col-md-8 col-lg-5">
            
            <div class="card_login shadow border-0 bg-white">
                <h2 class="h4 fw-bold text-center mb-4" style="color: #333;">Dados do Pequeno</h2>
                
                <form id="form-filhos">
                    <div class="mb-3">
                        <label for="Nome" class="fw-bold">Nome da Criança</label>
                        <input type="text" id="Nome" name="Nome" class="form-control custom-input" placeholder="Ex: Joãozinho">
                    </div>

                    <div class="mb-3">
                        <label for="CPF" class="fw-bold">CPF (ou Certidão)</label>
                        <input type="text" id="CPF" name="CPF" class="form-control custom-input" placeholder="000.000.000-00">
                    </div>

                    <div class="mb-4">
                        <label for="Alergias" class="fw-bold">Laudo de Alergia/Deficiência (PDF)</label>
                        <input type="file" id="Alergias" name="Alergias" class="form-control custom-input-file" accept=".pdf,.jpg,.png">
                    </div>

                    <div class="d-grid">
                        <button type="submit" id="cadastra_se" class="btn-cadastrar text-white fw-bold shadow-sm">
                            CADASTRAR FILHO
                        </button>
                    </div>
                </form>
            </div>

        </div>
    </div>
</main>

    <script src="../../js/inclusao_filhos/script_inclusao_filhos.js"></script>
</body>
</html>
