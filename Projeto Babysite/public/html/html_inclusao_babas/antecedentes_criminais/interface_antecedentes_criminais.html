<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Babysite - Antecedentes</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="icon" href="../../../css/logo_do_babysite.ico" type="image/x-icon">
    
    <link rel="stylesheet" href="../../../css/inclusao_babas/antecedentes_criminais/estilização_antecedentes.css">
</head>
<body class="bg-light">

    <header class="superior bg-babysite-laranja p-3 shadow-sm d-flex align-items-center gap-3 text-white">
        <img src="../../../css/logo_do_babysite.ico" alt="logo" width="55" height="55" 
             style="border-radius: 100px; border: 2px solid rgb(119, 0, 255);">
        <h1 class="h3 mb-0 fw-bold italic">Antecedentes Criminais</h1>
    </header>

    <main class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="card card-cadastro border-0 shadow-lg p-5">
                    <form id="form_antecedentes">
                        
                        <div class="text-center mb-4">
                            <h2 class="h4 fw-bold text-dark">Por favor, envie seus antecedentes criminais</h2>
                            <p class="text-muted small">O arquivo deve estar em PDF ou Imagem</p>
                        </div>

                        <div class="mb-4">
                            <label for="antecedentes_criminais" class="form-label d-none">Arquivo</label>
                            <input type="file" class="form-control form-control-lg custom-file-input" id="antecedentes_criminais" required>
                        </div>

                        <div class="form-check mb-4">
                            <input class="form-check-input" type="checkbox" id="termo_responsabilidade" required>
                            <label class="form-check-label text-muted small" for="termo_responsabilidade">
                                Você assume total responsabilidade pelos dados informados e pela veracidade do documento anexado.
                            </label>
                        </div>

                        <div class="d-grid">
                            <button id="Cadastro" type="submit" class="btn btn-babysite-roxo btn-lg fw-bold shadow-sm">
                                FINALIZAR CADASTRO
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../../js/inclusao_babas/antecedentes_criminais/antecedentes_crim.js"></script>
</body>
</html>
