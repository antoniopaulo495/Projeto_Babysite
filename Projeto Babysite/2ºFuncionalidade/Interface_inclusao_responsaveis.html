<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login</title>
    <link rel="icon" href="logo_do_babysite.ico" type="image/x-icon">
    <link rel="stylesheet" href="interface_inclusao_responsavel.css">


   
</head>
<body>

<form>
    <header class="superior">
 <img src="logo_do_babysite.ico" alt="logo_do_babysite" style="border-radius: 100px; border: 2px solid rgb(119, 0, 255) ";>
 <h1> Faça seu Cadastro!</h1>
    </header>

    <main class="layout_formulario">

 
      <div class="card-login">
        <h1> Cadastra-se como Responsável</h1><br>
         <label for="pais">Nome do Responsável: </label>
         <input id="pais" name="pais"><br>
         <label for="cpf">CPF: </label>
         <input id="cpf" name="cpf"><br>
         <label for="telefone">Telefone: </label>
         <input id="telefone" name="telefone"><br>

        <label for="email1">Email: </label>
        <input type="email" name="email1" id="email1"><br>
        <label for="email2">Email: </label>
        <input type="email" name="email2" id="email2"><br>

        <button id="confirmar">Confirmar</button>
     </div>

    </main>


    <script src="script_respon.js">
    </script>

</form>
</body>
</html>
